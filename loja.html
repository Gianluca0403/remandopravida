<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Loja</title>
    <link rel="stylesheet" href="style1.css" />
</head>
<body>

    <header class="header">
        <div class="logo">
            <!-- Coloque sua logo aqui -->
            <img src="https://via.placeholder.com/120x50" alt="Logo da Loja">
        </div>

        <nav class="menu">
            <a href="#">Início</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <section class="slider">
    <div class="slides">

        <!-- Slide 1 -->
        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f" alt="Banner 1">
            <div class="slide-text">
                <h2>REMANDO PRA VIDA SHOP</h2>
                <p>qualidade e estilo</p>
            </div>
        </div>

        <!-- Slide 2 -->
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30" alt="Banner 2">
            <div class="slide-text">
                <h2>CAMISETAS</h2>
                <p>Camitas com design unico</p>
            </div>
        </div>

        <!-- Slide 3 -->
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" alt="Banner 3">
            <div class="slide-text">
                <h2>SHAPES</h2>
                <p>Shapes unicos.</p>
            </div>
        </div>

    </div>

    <!-- Navegação -->
    <div class="slider-controls">
        <button class="prev">❮</button>
        <button class="next">❯</button>
    </div>

    <div class="dots"></div>
</section>


    <section class="hero-mini">
    <span class="tag">Nossos Produtos</span>
    <h2>Estilo que acompanha sua remada</h2>
    </section>

    <section class="products">
        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Produto 1">
            <h3>SHAPES</h3>
            <p class="price">R$ 79,90</p>
            <button class="buy-btn">Comprar</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Produto 2">
            <h3>CAMISA</h3>
            <p class="price">R$ 129,90</p>
            <button class="buy-btn">Comprar</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/250" alt="Produto 3">
            <h3>MOLETOM</h3>
            <p class="price">R$ 99,90</p>
            <button class="buy-btn">Comprar</button>
        </div>
    </section>

    <script src="loja.js"></script>
</body>
</html>
